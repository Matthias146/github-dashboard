<header class="header">
  <div class="container header__inner">
    <div class="header__brand">
      <svg class="header__logo" viewBox="0 0 16 16" width="24" height="24" fill="currentColor">
        <path
          d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
          0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52
          -.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2
          -3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82
          .64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08
          2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01
          1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
        />
      </svg>
      <span class="header__title">GitHub Explorer</span>
    </div>

    <div class="header__search">
      <svg
        class="header__search-icon"
        viewBox="0 0 16 16"
        width="16"
        height="16"
        fill="currentColor"
      >
        <path
          d="M11.5 7a4.499 4.499 0 11-8.998 0A4.499 4.499 0 0111.5 7zm-.82 4.74a6 6 0 111.06-1.06l3.04 3.03a.75.75 0 11-1.06 1.06l-3.04-3.03z"
        />
      </svg>
      <input
        class="header__input"
        type="text"
        placeholder="GitHub username suchen..."
        [value]="state.username()"
        (keydown)="onKeydown($event)"
        aria-label="GitHub Username"
      />
      <kbd class="header__kbd">↵</kbd>
    </div>

    <div class="header__meta">
      <span class="header__rate-limit">
        <span class="header__rate-dot"></span>
        57/60 requests
      </span>
    </div>
  </div>
</header>

<main class="main">
  <div class="container">
    <div class="dashboard">
      <div class="dashboard__main">
        <app-profile />
        <app-repositories />
      </div>
      <aside class="dashboard__sidebar">
        <app-stats />
      </aside>
    </div>
  </div>
</main>
