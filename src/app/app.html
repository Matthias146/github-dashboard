<header class="header">
  <div class="container header__inner">
    <div class="header__brand">
      <svg class="header__logo" viewBox="0 0 16 16" width="24" height="24" fill="currentColor">
        <path
          d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
          0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
          -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
          .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
          -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0
          1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82
          1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01
          1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
        />
      </svg>
      <span class="header__title">GitHub Explorer</span>
    </div>

    <div class="header__search">
      <svg
        class="header__search-icon"
        viewBox="0 0 16 16"
        width="16"
        height="16"
        fill="currentColor"
      >
        <path
          d="M11.5 7a4.499 4.499 0 11-8.998 0A4.499 4.499 0 0111.5 7zm-.82 4.74a6 6 0 111.06-1.06l3.04 3.03a.75.75 0 11-1.06 1.06l-3.04-3.03z"
        />
      </svg>
      <input
        class="header__input"
        type="text"
        placeholder="GitHub username suchen..."
        [value]="state.username()"
        (keydown)="onKeydown($event)"
        aria-label="GitHub Username"
      />
      <kbd class="header__kbd">↵</kbd>
    </div>

    <div class="header__meta">
      @if (rateLimit.display()) {
        <span class="header__rate-limit" [class.header__rate-limit--low]="rateLimit.isLow()">
          <span class="header__rate-dot"></span>
          {{ rateLimit.display()!.remaining }}/{{ rateLimit.display()!.limit }} requests
        </span>
      } @else {
        <span class="header__rate-limit">
          <span class="header__rate-dot"></span>
          — requests
        </span>
      }
    </div>
  </div>
</header>

<main class="main">
  <div class="container">
    @if (state.currentError()) {
      <app-error-state [error]="state.currentError()!" />
    } @else {
      <app-profile />

      <div class="dashboard">
        <div class="dashboard__main">
          <div class="tabs">
            <button
              class="tabs__btn"
              [class.active]="activeTab() === 'repos'"
              (click)="setTab('repos')"
            >
              <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor">
                <path
                  d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 011-1h8z"
                />
              </svg>
              Repositories
              @if (state.repos().length > 0) {
                <span class="tabs__count">{{ state.repos().length }}</span>
              }
            </button>
            <button
              class="tabs__btn"
              [class.active]="activeTab() === 'stats'"
              (click)="setTab('stats')"
            >
              <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor">
                <path
                  d="M1.5 1.75a.75.75 0 00-1.5 0v12.5c0 .414.336.75.75.75h14.5a.75.75 0 000-1.5H1.5V1.75zm14.28 2.53a.75.75 0 00-1.06-1.06L10 7.94 7.53 5.47a.75.75 0 00-1.06 0L3.22 8.72a.75.75 0 001.06 1.06L7 6.56l2.47 2.47a.75.75 0 001.06 0l5.25-5.25z"
                />
              </svg>
              Statistiken
            </button>
          </div>

          <div class="tab-content">
            @if (activeTab() === 'repos') {
              <app-repositories />
            } @else {
              <app-repo-table />
            }
          </div>
        </div>

        <aside class="dashboard__sidebar">
          <div class="sidebar-stats">
            <app-stat-card
              label="Repositories"
              [value]="state.user()?.public_repos ?? '—'"
              accent="blue"
            />
            <app-stat-card label="Total Stars" [value]="state.totalStars()" accent="amber" />
            <app-stat-card
              label="Followers"
              [value]="state.user()?.followers ?? '—'"
              accent="green"
            />
            <app-stat-card label="Following" [value]="state.user()?.following ?? '—'" />
          </div>
          <app-stats />
        </aside>
      </div>
    }
  </div>
</main>
